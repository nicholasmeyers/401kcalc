<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0B7285" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0B7285" />
    </linearGradient>
    <linearGradient id="barGradLight" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>
  <!-- Bars with rounded tops -->
  <rect x="48" y="96" width="56" height="48" rx="6" ry="6" fill="url(#barGrad)" filter="url(#softShadow)" />
  <rect x="128" y="56" width="56" height="88" rx="6" ry="6" fill="url(#barGradLight)" filter="url(#softShadow)" />
  <rect x="208" y="72" width="56" height="72" rx="6" ry="6" fill="url(#barGradLight)" filter="url(#softShadow)" />
  <rect x="288" y="48" width="56" height="96" rx="6" ry="6" fill="url(#barGradLight)" filter="url(#softShadow)" />
  <!-- Smooth trend line (ends at center of last bar) -->
  <path
    d="M 76 120 Q 152 64 232 88 T 316 72"
    stroke="url(#lineGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
